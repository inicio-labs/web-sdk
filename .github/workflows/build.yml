name: Build
on:
  push:
    branches: [main, next]
  pull_request:

permissions:
  contents: read

concurrency:
  group: "${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}"
  cancel-in-progress: true

env:
  CARGO_PROFILE_DEV_DEBUG: 0

jobs:
  # Pre-flight: detect whether any non-docs files changed. We deliberately
  # trigger this workflow on EVERY push/PR (no top-level paths-ignore) so
  # required status checks always report a state — `paths-ignore` at the
  # workflow level prevents the workflow from running at all on docs-only
  # PRs, which leaves required checks stuck in "Expected" forever and blocks
  # merging. Instead, every downstream job gates on this filter's output and
  # reports `skipped` when there's nothing relevant to build (skipped jobs
  # satisfy required checks).
  changes:
    name: Detect relevant changes
    runs-on: ubuntu-24.04
    outputs:
      non_docs: ${{ steps.filter.outputs.non_docs }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # `non_docs` matches whenever a changed file is NOT a doc/text file
          # under one of the listed paths. Mirror of the previous
          # `paths-ignore` set.
          filters: |
            non_docs:
              - '!**/*.md'
              - '!**/*.txt'
              - '!docs/**'

  build-wasm:
    name: Build Client for Wasm
    needs: [changes]
    if: needs.changes.outputs.non_docs == 'true'
    runs-on: warp-ubuntu-latest-x64-8x
    permissions:
      contents: read
      # Required by .github/actions/inject-linked-client-pr's sticky
      # comment step. Scoped to this job (the only one that posts) so
      # the rest of the workflow keeps the read-only default.
      pull-requests: write
    env:
      # See test.yml's build-web-client-dist-folder for rationale.
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - uses: actions/checkout@v6
      # Auto-patch miden-client dep against any "Client PR: #N" marker in
      # the PR description. This is the *one* job per workflow run that
      # opts into posting the sticky PR comment about the patch — every
      # other cargo-using job re-runs the action with comment=false (the
      # default) so we keep the strict 0-or-1 comment invariant.
      - name: Inject linked miden-client PR
        uses: ./.github/actions/inject-linked-client-pr
        with:
          comment: "true"
      - name: Cleanup large tools for build space
        uses: ./.github/actions/cleanup-runner
      - name: Install Rust toolchain
        run: rustup update --no-self-update
      - name: Add wasm32-unknown-unknown target
        run: |
          rustup target add wasm32-unknown-unknown
          # Stable wasm32 std for the ST rollup path (RUSTUP_TOOLCHAIN=stable
          # is set inside crates/web-client/rollup.config.js for the ST build).
          rustup install stable --no-self-update
          rustup target add wasm32-unknown-unknown --toolchain stable
      # `make build-wasm` invokes `pnpm --filter web_store run build` for
      # the idxdb-store TS bindings before the Rust WASM build runs. Need
      # pnpm + node + a populated workspace install in scope.
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      # See test.yml for rationale (GHA cache v1 -> v2 endpoint).
      - name: Configure sccache cache backend (v2)
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_RESULTS_URL', process.env.ACTIONS_RESULTS_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Run sccache
        uses: mozilla-actions/sccache-action@v0.0.10
        continue-on-error: true
        id: sccache-install

      - name: Probe sccache and enable wrapper if healthy
        if: steps.sccache-install.outcome == 'success' && env.SCCACHE_PATH != ''
        shell: bash
        run: |
          probe_out=$("$SCCACHE_PATH" --start-server 2>&1) && rc=0 || rc=$?
          echo "$probe_out"
          if [ $rc -eq 0 ]; then
            echo "RUSTC_WRAPPER=$SCCACHE_PATH" >> "$GITHUB_ENV"
            echo "sccache enabled as RUSTC_WRAPPER ($SCCACHE_PATH)"
          else
            echo "sccache --start-server failed (rc=$rc); running without wrapper"
          fi
      - name: make - build-wasm
        run: make build-wasm
      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true
