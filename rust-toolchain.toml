[toolchain]
# Nightly required for cfg(target_feature = "atomics") on wasm32 and -Z build-std
# (recompile std with atomics enabled). wasm-bindgen-rayon needs both to bootstrap
# the multi-threaded prover. Stable 1.93 silently emits a wasm with the +atomics
# bit set but the cfg() check still says false, so the wasm-bindgen-rayon compile
# guard fires.
#
# Pinned to a specific date for reproducibility — published WASM bytes and prove
# perf both shift with the toolchain. Bump deliberately, never via floating
# `nightly`. See PR #134 review (SantiagoPittella) for context.
channel = "nightly-2026-05-05"
components = ["clippy", "rust-src", "rustfmt"]
profile = "minimal"
targets = ["wasm32-unknown-unknown"]
