[workspace]
resolver = "2"

members = ["crates/idxdb-store", "crates/web-client", "crates/web-gpu-dft", "crates/web-gpu-air"]

[workspace.package]
authors = ["miden contributors"]
edition = "2024"
license = "MIT"
repository = "https://github.com/0xMiden/web-sdk"
rust-version = "1.93"
version = "0.14.0"

[profile.dev]
codegen-units = 16

[profile.test-dev]
inherits = "dev"
opt-level = 1

# Fast-build variant of `release` for PR CI. The default `release` profile
# (set up implicitly by @wasm-tool/rollup-plugin-rust) enables LTO and
# codegen-units=1, which together account for ~9 of the ~13 minutes the
# WASM build job takes. PR CI doesn't ship the artifact — it only verifies
# that the code compiles + tests pass — so we trade ~1.5x larger output for
# ~3-4x faster builds. The canonical `release` profile is still used by the
# `verify-release-build` job (push to main/next only) and any local
# `cargo build --release` so the published artifact is always built with
# full optimization.
[profile.release-fast]
inherits = "release"
lto = false
codegen-units = 16

[workspace.dependencies]
# Workspace crates
idxdb-store = { default-features = false, package = "miden-idxdb-store", path = "crates/idxdb-store", version = "0.14.0" }

# Miden client (from crates.io)
miden-client = { default-features = false, version = "0.14.5" }

# Miden protocol dependencies
miden-protocol = { default-features = false, version = "0.14" }
miden-standards = { default-features = false, version = "0.14" }

# External dependencies
async-trait = { version = "0.1" }
chrono = { version = "0.4" }
hex = { version = "0.4" }
miette = { features = ["fancy"], version = "7.6" }
rand = { version = "0.9" }
serde = { features = ["derive"], version = "1.0" }
thiserror = { default-features = false, version = "2.0" }
tracing = { version = "0.1" }

# Lints are set to warn for development, which are promoted to errors in CI.
[workspace.lints.clippy]
# Pedantic lints are set to a lower priority which allows lints in the group to be selectively enabled.
pedantic = { level = "warn", priority = -1 }
ignored_unit_patterns = "allow"              # Stylistic choice.
missing_errors_doc = "allow"                 # TODO: fixup and enable this.
missing_panics_doc = "allow"                 # TODO: fixup and enable this.
module_name_repetitions = "allow"            # Many triggers, and is a stylistic choice.
must_use_candidate = "allow"                 # This marks many fn's which isn't helpful.
should_panic_without_expect = "allow"        # We don't care about the specific panic message.
# End of pedantic lints.

# Uncomment for local development against a local miden-client checkout:
# [patch.crates-io]
# miden-client = { path = "../miden-client/crates/rust-client" }

# Local-fork overrides for the WebGPU NTT experiment.
# These point miden-vm and miden-base crates at local checkouts so the
# `prove_with_dft` entry point and `LocalTransactionProver::prove_with_dft`
# sibling method are visible to this build without committing to upstream
# until the speedup numbers justify it. **DO NOT MERGE** — strip this
# block once the upstream PRs land.
#
# Paths assume the standard layout: miden-vm and miden-base sibling-checked-
# out under ~/miden alongside this repo's worktree. Adjust as needed.
[patch.crates-io]
# miden-vm crates (DFT injection in air + prover, plus all sibling crates so
# the workspace is internally consistent at 0.22.3 — without these, transitive
# deps via miden-agglayer pull 0.22.1 from crates.io and conflict with our
# local 0.22.3 (multiple versions of miden-debug-types et al.).
miden-air                = { path = "/Users/celrisen/miden/miden-vm/air" }
miden-prover             = { path = "/Users/celrisen/miden/miden-vm/prover" }
miden-processor          = { path = "/Users/celrisen/miden/miden-vm/processor" }
miden-core               = { path = "/Users/celrisen/miden/miden-vm/core" }
miden-core-lib           = { path = "/Users/celrisen/miden/miden-vm/crates/lib/core" }
miden-assembly           = { path = "/Users/celrisen/miden/miden-vm/crates/assembly" }
miden-assembly-syntax    = { path = "/Users/celrisen/miden/miden-vm/crates/assembly-syntax" }
miden-debug-types        = { path = "/Users/celrisen/miden/miden-vm/crates/debug-types" }
miden-mast-package       = { path = "/Users/celrisen/miden/miden-vm/crates/mast-package" }
miden-package-registry   = { path = "/Users/celrisen/miden/miden-vm/crates/package-registry" }
miden-utils-sync         = { path = "/Users/celrisen/miden/miden-vm/crates/utils-sync" }
miden-utils-diagnostics  = { path = "/Users/celrisen/miden/miden-vm/crates/utils-diagnostics" }
miden-utils-indexing     = { path = "/Users/celrisen/miden/miden-vm/crates/utils-indexing" }
miden-utils-core-derive  = { path = "/Users/celrisen/miden/miden-vm/crates/utils-core-derive" }
# miden-base crates (LocalTransactionProver::prove_with_dft sibling method)
miden-tx        = { path = "/Users/celrisen/miden/miden-base/crates/miden-tx" }
miden-protocol  = { path = "/Users/celrisen/miden/miden-base/crates/miden-protocol" }
miden-standards = { path = "/Users/celrisen/miden/miden-base/crates/miden-standards" }
# p3-miden crates (tracing instrumentation inside evaluate_constraints_into)
p3-miden-lifted-air      = { path = "/Users/celrisen/miden/p3-miden/p3-miden-lifted-air" }
p3-miden-lifted-fri      = { path = "/Users/celrisen/miden/p3-miden/p3-miden-lifted-fri" }
p3-miden-lifted-stark    = { path = "/Users/celrisen/miden/p3-miden/p3-miden-lifted-stark" }
p3-miden-lmcs            = { path = "/Users/celrisen/miden/p3-miden/p3-miden-lmcs" }
p3-miden-stateful-hasher = { path = "/Users/celrisen/miden/p3-miden/p3-miden-stateful-hasher" }
p3-miden-transcript      = { path = "/Users/celrisen/miden/p3-miden/p3-miden-transcript" }
# p3-goldilocks fork (Phase P1: wasm-simd128 packed Goldilocks for Plonky3
# `Goldilocks::Packing` on wasm32 — currently width=1 / scalar; target width=2).
p3-goldilocks            = { path = "/Users/celrisen/miden/p3-goldilocks" }
